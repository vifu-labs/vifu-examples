<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Hello Web</title>
    <style>
      :root {
        color-scheme: dark;
        font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        background: #111315;
        color: #f7f3e8;
      }

      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
      }

      main {
        width: min(640px, calc(100vw - 48px));
      }

      h1 {
        margin: 0 0 12px;
        font-size: 42px;
        line-height: 1.05;
      }

      p {
        margin: 0;
        color: #bbc3be;
        font-size: 18px;
        line-height: 1.6;
      }
    </style>
  </head>
  <body>
    <main>
      <h1>Hello Web</h1>
      <p>This is a minimal Vifu runtime. Add a manifest, deploy the directory, then replace this screen with your own app or game.</p>
    </main>
  </body>
</html>
